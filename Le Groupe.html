<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Majestis — Le Groupe</title>
<meta http-equiv="refresh" content="0; url=Portrait.html">
<link rel="canonical" href="Portrait.html">
<script>window.location.replace("Portrait.html");</script>
</head>
<body>
<p>Redirection vers <a href="Portrait.html">Portrait</a>...</p>

  <style id="majestis-light-theme">
  /* ===== Thème clair (fond beige) — textes sur fond, jamais sur photo ===== */
  body { color: #15172c; }
  .page-title, .real-title, .real-title span, .md-link, .reals-empty,
  .section-title, .metier-title, .member-name, .essay-title, .nous-eyebrow em,
  .contact-name, .info-value, .info-value a, .legal-inner strong { color: #15172c; }
  .real-body, .real-list li { color: rgba(18,20,40,0.9); }

  /* séparateurs / filets dorés un peu plus marqués sur clair */
  .real + .real { border-top-color: rgba(176,138,54,0.30); }
  .page-rule { background: linear-gradient(to bottom, transparent, #876616); }

  /* dégradé or assombri (bronze) pour rester lisible sur beige — titres sur fond uniquement */
  .page-title em, .real-title em, .metier-title em, .essay-title em, .section-title em {
    background: linear-gradient(135deg,#9c7518 0%,#7a5912 35%,#574010 60%,#7a5912 85%,#9c7518 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; filter: none;
  }

  /* petites capitales / labels dorés -> bronze plus contrasté sur beige */
  .real-tag, .back-link, .breadcrumb .here, .breadcrumb .sep,
  .dropdown-eyebrow, .footer-copy span, .footer-social a, .back-to-top { color: #785a14; }
  .footer-social a { border-color: rgba(176,138,54,0.5); }
  .back-link:hover { color: #5b430f; }
  .nav-item:hover .nav-link, .nav-item:focus-within .nav-link,
  .dropdown a:hover, .dropdown-eyebrow:hover, .menu-call:hover,
  .md-link:hover, .footer-menu a:hover, .footer-social a:hover,
  .back-link:hover { color: #5b430f; }
  </style>

  <style id="majestis-readability">
  /* Lisibilité : seul le sous-titre des pages (sous le grand titre) est agrandi — propre, le reste inchangé */
  .page-sub { font-size: clamp(20px, 1.6vw, 26px); color: rgba(18,20,40,0.9); line-height: 1.55; }
  </style>

</body>
</html>
